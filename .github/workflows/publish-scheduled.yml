name: Publicar Posts Agendados

on:
  schedule:
    # Roda às 06:00 UTC = 03:00 BRT (Brasília) todos os dias
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Simular sem publicar (dry run)'
        required: false
        default: 'false'
        type: boolean

jobs:
  publicar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verificar e publicar posts agendados
        run: |
          python3 .github/scripts/publish.py ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Verificar se há mudanças
        id: changes
        run: |
          if git diff --quiet && git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit e push dos novos posts
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Feminnita Bot"
          git config user.email "bot@feminnita.com.br"
          git add -A
          git commit -m "🤖 Auto-publicar posts agendados — $(date +'%d/%m/%Y')"
          git push
